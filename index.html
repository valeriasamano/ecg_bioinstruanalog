<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo ECG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-10 card shadow p-4 bg-white rounded">
                <h2 class="text-center text-danger mb-4">❤️ Monitoreo ECG en Tiempo Real</h2>
                <div class="mb-4" style="position: relative; height:45vh; width:100%">
                    <canvas id="ecgChart"></canvas>
                </div>
                <hr>
                <div class="row g-3 align-items-center">
                    <div class="col-sm-4">
                        <button class="btn btn-outline-danger w-100 py-2" onclick="descargarExcel()">📥 Descargar Reporte Excel</button>
                    </div>
                    <div class="col-sm-4">
                        <input type="text" id="nombrePaciente" class="form-control py-2" placeholder="Nombre del Paciente">
                    </div>
                    <div class="col-sm-4">
                        <div class="input-group">
                            <input type="email" id="correoDoctor" class="form-control py-2" placeholder="correo.doctor@gmail.com">
                            <button class="btn btn-success" type="button" onclick="enviarAlDoctor()">📧 Enviar al Dr.</button>
                        </div>
                    </div>
                </div>
                <div id="statusAlert" class="mt-3 alert d-none" role="alert"></div>
            </div>
        </div>
    </div>
    <script>
        // Esta URL la actualizaremos en cuanto Render nos dé la suya real
        const BACKEND_URL = "https://tu-app-en-render.onrender.com"; 
        let chart;

        function simularDatosECG() {
            let tiempo = [], voltaje = [];
            for (let i = 0; i < 200; i++) {
                let t = i * 0.02;
                let v = 0.1 * Math.sin(2 * Math.PI * 1.2 * t); 
                if (i % 50 === 0) v += 1.5; 
                if ((i-2) % 50 === 0) v -= 0.3; 
                voltaje.push(v + (Math.random() - 0.5) * 0.05); 
                tiempo.push(t.toFixed(2));
            }
            return { tiempo, voltaje };
        }

        function inicializarGrafica() {
            const ctx = document.getElementById('ecgChart').getContext('2d');
            const datosLocales = simularDatosECG();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: datosLocales.tiempo,
                    datasets: [{
                        label: 'Voltaje (mV)',
                        data: datosLocales.voltaje,
                        borderColor: 'rgb(220, 53, 69)',
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { title: { display: true, text: 'Tiempo (s)' } },
                        y: { title: { display: true, text: 'Amplitud (mV)' } }
                    }
                }
            });
        }

        async function cargarDatos() {
            inicializarGrafica();
            try {
                const response = await fetch(`${BACKEND_URL}/api/ecg`);
                if (response.ok) {
                    const data = await response.json();
                    chart.data.labels = data.tiempo.map(t => t.toFixed(2));
                    chart.datasets[0].data = data.voltaje;
                    chart.update();
                }
            } catch (e) { console.log("Usando datos locales simulados por ahora."); }
        }

        function descargarExcel() { window.location.href = `${BACKEND_URL}/api/descargar`; }

        async function enviarAlDoctor() {
            const correo = document.getElementById('correoDoctor').value;
            const nombre = document.getElementById('nombrePaciente').value;
            if (!correo || !nombre) {
                mostrarAlerta("Por favor, llena los campos.", "warning");
                return;
            }
            mostrarAlerta("Enviando correo...", "info");
            try {
                const response = await fetch(`${BACKEND_URL}/api/enviar-correo`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ correo_doctor: correo, nombre_paciente: nombre })
                });
                const result = await response.json();
                if (result.status === "success") mostrarAlerta("¡Reporte enviado con éxito!", "success");
                else mostrarAlerta("Error: " + result.message, "danger");
            } catch (error) {
                mostrarAlerta("El servidor de Render aún no está conectado, pero la UI funciona.", "danger");
            }
        }

        function mostrarAlerta(mensaje, tipo) {
            const alerta = document.getElementById('statusAlert');
            alerta.className = `mt-3 alert alert-${tipo}`;
            alerta.innerText = mensaje;
            alerta.classList.remove('d-none');
        }
        window.onload = cargarDatos;
    </script>
</body>
</html>
