<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo ECG - Sistema Médico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-10 card shadow p-4 bg-white rounded">
                <h2 class="text-center text-danger mb-4">❤️ Monitoreo ECG en Tiempo Real</h2>
                
                <div class="mb-4" style="position: relative; height:45vh; width:100%">
                    <canvas id="ecgChart"></canvas>
                </div>

                <hr>

                <div class="row g-3 align-items-center">
                    <div class="col-sm-4">
                        <button class="btn btn-outline-danger w-100 py-2" onclick="descargarExcel()">
                            📥 Descargar Reporte Excel
                        </button>
                    </div>
                    
                    <div class="col-sm-4">
                        <input type="text" id="nombrePaciente" class="form-control py-2" placeholder="Nombre del Paciente">
                    </div>

                    <div class="col-sm-4">
                        <div class="input-group">
                            <input type="email" id="correoDoctor" class="form-control py-2" placeholder="correo.doctor@gmail.com">
                            <button class="btn btn-success" type="button" onclick="enviarAlDoctor()">📧 Enviar al Dr.</button>
                        </div>
                    </div>
                </div>
                
                <div id="statusAlert" class="mt-3 alert d-none" role="alert"></div>
            </div>
        </div>
    </div>
    <script>
        // Enlace real interconectado con tu Web Service de Render
        const BACKEND_URL = "https://ecg-bioinstruanalog.onrender.com"; 
        let chart;

        // Generación de respaldo local en caso de que tarde en responder el servidor
        function simularDatosECG() {
            let tiempo = [];
            let voltaje = [];
            for (let i = 0; i < 200; i++) {
                let t = i * 0.02;
                let v = 0.1 * Math.sin(2 * Math.PI * 1.2 * t); 
                if (i % 50 === 0) v += 1.5; // Onda R del complejo QRS
                if ((i-2) % 50 === 0) v -= 0.3; // Onda S
                voltaje.push(v + (Math.random() - 0.5) * 0.05); // Señal + Ruido analógico
                tiempo.push(t.toFixed(2));
            }
            return { tiempo, voltaje };
        }

        // Configuración inicial del Canvas de la gráfica
        function inicializarGrafica() {
            const ctx = document.getElementById('ecgChart').getContext('2d');
            const datosLocales = simularDatosECG();

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: datosLocales.tiempo,
                    datasets: [{
                        label: 'Voltaje (mV)',
                        data: datosLocales.voltaje,
                        borderColor: 'rgb(220, 53, 69)',
                        borderWidth: 2,
                        pointRadius: 0, // Línea continua tipo osciloscopio
                        fill: false,
                        tension: 0.2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { title: { display: true, text: 'Tiempo (s)' } },
                        y: { title: { display: true, text: 'Amplitud (mV)', min: -0.5, max: 2.0 } }
                    }
                }
            });
        }

        // Petición asíncrona para traer los datos del ECG procesados por Python
        async function cargarDatos() {
            inicializarGrafica();
            try {
                const response = await fetch(`${BACKEND_URL}/api/ecg`);
                if (response.ok) {
                    const data = await response.json();
                    chart.data.labels = data.tiempo.map(t => t.toFixed(2));
                    chart.datasets[0].data = data.voltaje;
                    chart.update();
                }
            } catch (e) {
                console.log("Servidor en Render despertando. Usando datos de respaldo en UI.");
            }
        }

        // Descarga directa del archivo de Excel generado por Pandas
        function descargarExcel() {
            window.location.href = `${BACKEND_URL}/api/descargar`;
        }

        // Envío del JSON con el correo del médico y nombre del paciente hacia Render
        async function enviarAlDoctor() {
            const correo = document.getElementById('correoDoctor').value;
            const nombre = document.getElementById('nombrePaciente').value;

            if (!correo || !nombre) {
                mostrarAlerta("Por favor, llena tanto el nombre del paciente como el correo del médico.", "warning");
                return;
            }

            mostrarAlerta("Procesando datos en el servidor y preparando correo...", "info");

            try {
                const response = await fetch(`${BACKEND_URL}/api/enviar-correo`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ correo_doctor: correo, nombre_paciente: nombre })
                });
                const result = await response.json();

                if (result.status === "success") {
                    mostrarAlerta("¡El correo electrónico con el Excel adjunto ha sido enviado con éxito!", "success");
                } else {
                    mostrarAlerta("Error del servidor de correos: " + result.message, "danger");
                }
            } catch (error) {
                mostrarAlerta("No se pudo conectar con el servidor de Render para procesar el envío.", "danger");
            }
        }

        function mostrarAlerta(mensaje, tipo) {
            const alerta = document.getElementById('statusAlert');
            alerta.className = `mt-3 alert alert-${tipo}`;
            alerta.innerText = mensaje;
            alerta.classList.remove('d-none');
        }

        window.onload = cargarDatos;
    </script>
</body>
</html>
